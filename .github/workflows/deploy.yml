name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - demoapp

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Write backend/.env from GitHub Secrets ───────────────────────────────
      # Add these secrets in: GitHub repo → Settings → Secrets → Actions
      #   TINK_CLIENT_ID, TINK_CLIENT_SECRET, SESSION_SECRET,
      #   VITE_API_BASE (e.g. https://api.seuropay.com or your backend URL)
      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          TINK_CLIENT_ID=${{ secrets.TINK_CLIENT_ID }}
          TINK_CLIENT_SECRET=${{ secrets.TINK_CLIENT_SECRET }}
          TINK_API_BASE=https://api.tink.com
          TINK_REDIRECT_URI=${{ secrets.VITE_API_BASE }}/api/tink/callback
          TINK_PIS_REDIRECT_URI=http://localhost:5173
          PORT=4000
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          FRONTEND_URL=https://demo.seuropay.com
          EOF

      - name: Build
        run: pnpm run build
        env:
          # Baked into the frontend bundle at build time (Vite replaces import.meta.env.*)
          # Set VITE_API_BASE in GitHub Secrets to your deployed backend URL,
          # e.g. https://api.seuropay.com  (leave empty to use same-origin proxy)
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: demo.seuropay.com
