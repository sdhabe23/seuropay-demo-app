name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - demoapp

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Inject secrets into backend/.env ─────────────────────────────────────
      # Required GitHub Secrets (repo → Settings → Secrets → Actions):
      #
      #   TINK_CLIENT_ID      Your Tink sandbox client ID
      #   TINK_CLIENT_SECRET  Your Tink sandbox client secret
      #   SESSION_SECRET      Random string: run `openssl rand -hex 32`
      #
      # Optional — only needed if you deploy the Node.js backend somewhere:
      #   BACKEND_URL         e.g. https://seuropay-api.railway.app
      #                       Leave unset → frontend calls /api/* on same origin
      #                       (works if you put a reverse proxy in front of both)
      - name: Create backend .env
        env:
          TINK_CLIENT_ID: ${{ secrets.TINK_CLIENT_ID }}
          TINK_CLIENT_SECRET: ${{ secrets.TINK_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          FRONTEND="https://demo.seuropay.com"
          BACKEND="${BACKEND_URL:-$FRONTEND}"
          cat > backend/.env << EOF
          TINK_CLIENT_ID=${TINK_CLIENT_ID}
          TINK_CLIENT_SECRET=${TINK_CLIENT_SECRET}
          TINK_API_BASE=https://api.tink.com
          TINK_REDIRECT_URI=${FRONTEND}
          TINK_PIS_REDIRECT_URI=${FRONTEND}
          PORT=4000
          SESSION_SECRET=${SESSION_SECRET}
          FRONTEND_URL=${FRONTEND}
          EOF

      - name: Build
        run: pnpm run build
        env:
          # VITE_API_BASE is baked into the JS bundle at build time.
          # - If BACKEND_URL secret is set (e.g. https://seuropay-api.railway.app),
          #   the frontend will call that URL for all /api/* requests.
          # - If NOT set, frontend calls /api/* on the same origin (demo.seuropay.com).
          #   This works if your hosting proxies /api/* to the backend, or if
          #   you accept that Tink linking won't work on the static demo.
          VITE_API_BASE: ${{ secrets.BACKEND_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: demo.seuropay.com
