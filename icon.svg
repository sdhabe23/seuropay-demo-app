<?xml version="1.0" encoding="UTF-8"?>
<!--
  This SVG acts as a tiny wrapper that references the PNG logo at /seuropay-logo-512.png.
  Browsers that accept SVG icons will still get an SVG, while mobile/Android will also
  pick up the PNG icons specified in manifest.webmanifest.

  Replace /seuropay-logo-512.png with your actual raster logo file (the attachment you
  provided). If you'd like, I can embed the raster as base64 inside this SVG for a
  single-file icon — tell me and provide the PNG/JPEG bytes or allow me to encode the
  attached image.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="100%" height="100%" fill="none" />
  <image href="/seuropay-logo-512.png" width="512" height="512" preserveAspectRatio="xMidYMid meet" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="100%" height="100%" rx="64" fill="#030213" />
  <text x="50%" y="54%" font-family="Inter, Arial, sans-serif" font-size="220" fill="#fff" font-weight="700" text-anchor="middle" dominant-baseline="middle">S</text>
</svg>
